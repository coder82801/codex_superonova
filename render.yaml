services:
  - type: web
    name: spike-scanner
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python train_spike_model.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 180
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
